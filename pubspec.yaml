name: authforge
description: "AuthForge "


publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter  
  cupertino_icons: ^1.0.8
  mobile_scanner: ^7.3.0
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.1
  otp: ^3.2.0
  dio: ^5.10.0
  get_it: ^9.2.1
  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# App launcher icon. Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#2E2B4E"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"

# Native splash screen. Regenerate with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#2E2B4E"
  image: assets/images/logo_foreground.png
  android_12:
    color: "#2E2B4E"
    image: assets/images/logo_foreground.png

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
